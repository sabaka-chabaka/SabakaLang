name: SabakaLang-CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    
jobs: 
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with: 
          dotnet-version: 10.0.x
          
      - name: Restore
        run: dotnet restore
        
      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true
        
      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx"
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'
          
  build-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true
        
  cover:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Cover
        run: |
          dotnet test --no-build --configuration Release \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          /p:Threshold=50 \
          /p:ThresholdType=line \
          /p:ThresholdStat=total
          
      - name: Debug - List Files
        run: find ./coverage -name "coverage.cobertura.xml"    
          
      - name: Merge Reports & Create Summary
        uses: danielpalme/ReportGenerator-GitHub-Action@5.2.4
        with:
          reports: 'coverage/**/*.xml'
          targetdir: 'merged_coverage'
          reporttypes: 'MarkdownSummary'
            
      - name: Write Summary to Commit
        run: |
          if [ -f "merged_coverage/Summary.md" ]; then
            cat merged_coverage/Summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Summary don't exists" >> $GITHUB_STEP_SUMMARY
          fi
          
  versions-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
        
      - name: Install sabaka-chabaka/NugetSpy
        run: dotnet tool install --global sabaka-chabaka.NugetSpy --version 1.0.5
        
      - name: Run NugetSpy and write summary
        if: always()
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### NuGet Spy Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          NO_COLOR=1 nuget-spy >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
  build-deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test, build-check, cover, versions-check]
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Restore
        run: dotnet restore
        
      - name: Build Solution
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true
          
      - name: Publish Cli
        run: dotnet publish SabakaLang.Cli/SabakaLang.Cli.csproj -c Release -o ./publish-cli --no-build
          
      - name: Publish Runner
        run: dotnet publish SabakaLang.Runner/SabakaLang.Runner.csproj -c Release -o ./publish-runner --no-build
        
      - name: Upload Cli Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SabakaLang-Cli
          path: ./publish-cli/
            
      - name: Upload Runner Artifact
          uses: actions/upload-artifact@v4
          with:
            name: SabakaLang-Runner
            path: ./publish-runner/      